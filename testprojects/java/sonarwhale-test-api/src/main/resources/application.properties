spring.application.name=sonarwhale-test-api
server.port=8080

# springdoc — OpenAPI spec at /v3/api-docs (Sonarwhale Spring Boot auto-discovery path)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Disable default Spring Security login page (we handle auth via JWT)
spring.security.user.name=ignored
spring.security.user.password=ignored

# Multipart file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
